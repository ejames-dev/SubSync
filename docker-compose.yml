services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '55433:5432'
    environment:
      POSTGRES_DB: subsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - subsync-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  subsync-db:
